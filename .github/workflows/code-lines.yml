name: Code Stats Badges

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '.github/badges/code-lines*.svg'
      - 'README.md'
      - 'README_en.md'
  workflow_dispatch:

permissions:
  contents: write

env:
  BADGE_DIR: .github/badges
  CODE_STATS_BEGIN: '<!-- code-stats:start -->'
  CODE_STATS_END: '<!-- code-stats:end -->'
  CODE_STATS_WORKFLOW_URL: https://github.com/JMC2002/SlayTheSpire2_JmcModLib/actions/workflows/code-lines.yml
  EXCLUDE_PATH_REGEX: '(^|/)(bin|obj|\.vs|modPublish|\.github/badges)(/|$)'
  CLOC_EXCLUDE_LANGUAGES: Markdown,Text
  CODE_EXTENSIONS: '.cs,.csproj,.props,.targets,.yml,.yaml,.json,.xml,.gd,.godot,.cfg,.sln,.slnx'

jobs:
  update-code-stats-badges:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install cloc
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y cloc

      - name: Update code stats badges
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $badgeDir = $env:BADGE_DIR
          $fileList = ".cloc-files.txt"
          $clocReport = ".cloc-report.json"
          $excludedPathRegex = $env:EXCLUDE_PATH_REGEX
          $codeExtensions = $env:CODE_EXTENSIONS.Split(",", [StringSplitOptions]::RemoveEmptyEntries) |
            ForEach-Object { $_.Trim().ToLowerInvariant() }

          function Test-ExcludedPath([string]$path) {
            return [string]::IsNullOrWhiteSpace($path) -or $path -match $excludedPathRegex
          }

          function Escape-SvgText([string]$value) {
            return [System.Net.WebUtility]::HtmlEncode($value)
          }

          function Format-Count([Int64]$value) {
            return $value.ToString("N0", [System.Globalization.CultureInfo]::InvariantCulture)
          }

          function Get-BadgeSegmentWidth([string]$value, [int]$minimum) {
            $width = 0
            foreach ($char in $value.ToCharArray()) {
              if ([int][char]$char -gt 127) {
                $width += 13
              } elseif ($char -cmatch '[A-Z0-9#]') {
                $width += 7
              } else {
                $width += 6
              }
            }

            return [Math]::Max($minimum, $width + 18)
          }

          function Get-LanguageSlug([string]$language) {
            $slug = $language.ToLowerInvariant()
            $slug = $slug -replace '\#', 'sharp'
            $slug = $slug -replace '\+', 'plus'
            $slug = $slug -replace '[^a-z0-9]+', '-'
            $slug = $slug.Trim('-')

            if ([string]::IsNullOrWhiteSpace($slug)) {
              return "unknown"
            }

            return $slug
          }

          function Write-Badge([string]$path, [string]$label, [string]$message, [string]$messageColor) {
            $labelWidth = Get-BadgeSegmentWidth $label 42
            $messageWidth = Get-BadgeSegmentWidth $message 42
            $totalWidth = $labelWidth + $messageWidth
            $labelCenter = [Math]::Floor($labelWidth / 2)
            $messageCenter = $labelWidth + [Math]::Floor($messageWidth / 2)
            $aria = Escape-SvgText "${label}: $message"
            $safeLabel = Escape-SvgText $label
            $safeMessage = Escape-SvgText $message

            $svg = @"
          <svg xmlns="http://www.w3.org/2000/svg" width="$totalWidth" height="22" role="img" aria-label="$aria">
            <title>$aria</title>
            <linearGradient id="s" x2="0" y2="100%">
              <stop offset="0" stop-color="#fff" stop-opacity=".12"/>
              <stop offset="1" stop-color="#000" stop-opacity=".06"/>
            </linearGradient>
            <clipPath id="r">
              <rect width="$totalWidth" height="22" rx="6" fill="#fff"/>
            </clipPath>
            <g clip-path="url(#r)">
              <rect width="$labelWidth" height="22" fill="#3f3f46"/>
              <rect x="$labelWidth" width="$messageWidth" height="22" fill="$messageColor"/>
              <rect width="$totalWidth" height="22" fill="url(#s)"/>
            </g>
            <g fill="#fff" text-anchor="middle" font-family="Segoe UI, Noto Sans, Helvetica, Arial, sans-serif" font-size="12" font-weight="600">
              <text x="$labelCenter" y="15">$safeLabel</text>
              <text x="$messageCenter" y="15">$safeMessage</text>
            </g>
          </svg>
          "@

            $svg.Trim() | Set-Content -Path $path -Encoding utf8
          }

          function Get-ReadmeBadgeLine([string]$alt, [string]$path) {
            return "  <a href=`"$env:CODE_STATS_WORKFLOW_URL`"><img alt=`"$alt`" src=`"$path`"></a>"
          }

          function Update-ReadmeBadges([string]$readmePath, [object[]]$badgeItems) {
            $text = Get-Content -Path $readmePath -Raw
            $isEnglish = $readmePath -like "*_en.md"
            $lines = New-Object System.Collections.Generic.List[string]
            $lines.Add($env:CODE_STATS_BEGIN)

            foreach ($item in $badgeItems) {
              $alt = if ($isEnglish) { $item.AltEn } else { $item.AltZh }
              $lines.Add((Get-ReadmeBadgeLine $alt $item.Path))
            }

            $lines.Add($env:CODE_STATS_END)
            $block = $lines -join [Environment]::NewLine
            $start = [Regex]::Escape($env:CODE_STATS_BEGIN)
            $end = [Regex]::Escape($env:CODE_STATS_END)
            $markerPattern = "(?s)$start.*?$end"

            if ([Regex]::IsMatch($text, $markerPattern)) {
              $text = [Regex]::Replace($text, $markerPattern, [System.Text.RegularExpressions.MatchEvaluator]{ param($match) $block }, 1)
            } else {
              $legacyPattern = '(?m)^\s*<a href="https://github\.com/JMC2002/SlayTheSpire2_JmcModLib/actions/workflows/code-lines\.yml"><img alt="[^"]+" src="\.github/badges/code-lines\.svg"></a>\s*$'
              if ([Regex]::IsMatch($text, $legacyPattern)) {
                $text = [Regex]::Replace($text, $legacyPattern, [System.Text.RegularExpressions.MatchEvaluator]{ param($match) $block }, 1)
              } else {
                $text = [Regex]::Replace($text, '(?m)^</p>\s*$', "$block$([Environment]::NewLine)</p>", 1)
              }
            }

            $text.TrimEnd("`r", "`n") | Set-Content -Path $readmePath -Encoding utf8
          }

          New-Item -ItemType Directory -Force $badgeDir | Out-Null

          $files = git ls-files | Where-Object {
            -not (Test-ExcludedPath $_) -and
            $codeExtensions -contains [System.IO.Path]::GetExtension($_).ToLowerInvariant()
          }

          $files | Set-Content -Path $fileList -Encoding utf8

          $clocArgs = @(
            "--json",
            "--quiet",
            "--list-file=$fileList"
          )

          if (-not [string]::IsNullOrWhiteSpace($env:CLOC_EXCLUDE_LANGUAGES)) {
            $clocArgs += "--exclude-lang=$env:CLOC_EXCLUDE_LANGUAGES"
          }

          $clocJson = (& cloc @clocArgs) -join [Environment]::NewLine
          if ($LASTEXITCODE -ne 0) {
            throw "cloc failed with exit code $LASTEXITCODE"
          }

          $clocJson | Set-Content -Path $clocReport -Encoding utf8
          $report = $clocJson | ConvertFrom-Json
          $languageStats = @(
            $report.PSObject.Properties |
              Where-Object { $_.Name -notin @("header", "SUM") -and [int64]$_.Value.code -gt 0 } |
              ForEach-Object {
                [pscustomobject]@{
                  Language = $_.Name
                  Code = [int64]$_.Value.code
                  Slug = Get-LanguageSlug $_.Name
                }
              } |
              Sort-Object -Property Code -Descending
          )

          $total = [int64]$report.SUM.code
          $added = [int64]0
          $deleted = [int64]0
          $numstatLines = git log --numstat --pretty=tformat:

          foreach ($line in $numstatLines) {
            if ($line -notmatch '^(\d+)\s+(\d+)\s+(.+)$') {
              continue
            }

            $path = $Matches[3]
            if (Test-ExcludedPath $path) {
              continue
            }

            $extension = [System.IO.Path]::GetExtension($path).ToLowerInvariant()
            if ($codeExtensions -notcontains $extension) {
              continue
            }

            $added += [int64]$Matches[1]
            $deleted += [int64]$Matches[2]
          }

          Get-ChildItem -Path $badgeDir -Filter "code-lines*.svg" -File | Remove-Item -Force

          $badgeItems = New-Object System.Collections.Generic.List[object]
          foreach ($stat in $languageStats) {
            $badgePath = "$badgeDir/code-lines-$($stat.Slug).svg"
            Write-Badge $badgePath $stat.Language (Format-Count $stat.Code) "#0f766e"
            $relativePath = $badgePath.Replace("\", "/")
            $badgeItems.Add([pscustomobject]@{
              Path = $relativePath
              AltZh = "$($stat.Language) 行数"
              AltEn = "$($stat.Language) lines"
            })
          }

          $totalBadgePath = "$badgeDir/code-lines-total.svg"
          Write-Badge $totalBadgePath "total" (Format-Count $total) "#2563eb"
          Write-Badge "$badgeDir/code-lines.svg" "total" (Format-Count $total) "#2563eb"
          $badgeItems.Add([pscustomobject]@{
            Path = $totalBadgePath.Replace("\", "/")
            AltZh = "总代码行数"
            AltEn = "Total code lines"
          })

          $addedBadgePath = "$badgeDir/code-lines-added.svg"
          Write-Badge $addedBadgePath "added" (Format-Count $added) "#16a34a"
          $badgeItems.Add([pscustomobject]@{
            Path = $addedBadgePath.Replace("\", "/")
            AltZh = "累计新增行数"
            AltEn = "Total added lines"
          })

          $deletedBadgePath = "$badgeDir/code-lines-deleted.svg"
          Write-Badge $deletedBadgePath "deleted" (Format-Count $deleted) "#dc2626"
          $badgeItems.Add([pscustomobject]@{
            Path = $deletedBadgePath.Replace("\", "/")
            AltZh = "累计删除行数"
            AltEn = "Total deleted lines"
          })

          Update-ReadmeBadges "README.md" $badgeItems.ToArray()
          Update-ReadmeBadges "README_en.md" $badgeItems.ToArray()

      - name: Commit badge update
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- "$BADGE_DIR"/code-lines*.svg README.md README_en.md; then
            echo "Code stats badges are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A "$BADGE_DIR"/code-lines*.svg README.md README_en.md
          git commit -m "chore: update code stats badges"
          git push
